services:
  app:
    build: .
    volumes:
      - .:/app
      - ./data_sync:/mnt/network:ro
      - "D:/PC ALLEGRETTI COEMI/STORICO SCHEDE/Archivio Schede Elaborate:/mnt/archivio_storico:ro"
    environment:
      - IS_DOCKER=true
    command: sh -c "python scripts/crea_database.py && streamlit run src/app.py --server.port=8501 --server.address=0.0.0.0"

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/manutenzione.html:/usr/share/nginx/html/manutenzione.html:ro
    depends_on:
      - app

  ngrok:
    image: ngrok/ngrok:latest
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http --domain opencircuit-grimily-mirta.ngrok-free.app proxy:80
    depends_on:
      - proxy
