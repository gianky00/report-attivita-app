exclude: '^(logs/|sessions/|assets/|prompt/)'

repos:
  # 1. Hook generici (velocissimi)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: debug-statements

  # 2. Ruff: Lint + Format (veloce, sostituisce Black+Isort+Flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # 3. Mypy: Type checking (local hook — usa l'ambiente Python di sistema
  #    così ha accesso a tutti i pacchetti e stubs installati)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: python -m mypy src/
        language: system
        always_run: true
        pass_filenames: false

  # 4. Deptry
  - repo: local
    hooks:
      - id: deptry
        name: deptry
        entry: python -m deptry src/
        language: system
        always_run: true
        pass_filenames: false

  # 5. Refurb (modernizzazione)
  - repo: https://github.com/dosisod/refurb
    rev: v2.0.0
    hooks:
      - id: refurb
        exclude: '^tests/'

  # 6. Bandit (sicurezza)
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
        files: ^src/

  # 7. Codespell (typo)
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
