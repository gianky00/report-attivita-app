
server {
    listen 80;
    server_name localhost;

    # Pagina di errore personalizzata per 502 (Bad Gateway) e 503 (Service Unavailable)
    error_page 502 503 /manutenzione.html;

    location / {
        proxy_pass http://app:8501;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Supporto per WebSockets (fondamentale per Streamlit)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeout per evitare che Nginx chiuda la connessione mentre l'app parte
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    location = /manutenzione.html {
        root /usr/share/nginx/html;
        internal;
    }
}
