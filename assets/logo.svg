<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <!-- Gradiente Principale: Deep Blue to Cyan -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0061ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60efff;stop-opacity:1" />
    </linearGradient>
    
    <!-- Filtro per l'effetto Glow (Bagliore) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Gradiente per il Testo -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#334155;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Simbolo Tecnico: Esagono Minimalista + Arco Horizon -->
  <g transform="translate(20, 10)">
    <!-- Base Esagonale sottile -->
    <path d="M40 5 L75 25 L75 65 L40 85 L5 65 L5 25 Z" fill="none" stroke="#e2e8f0" stroke-width="1" />
    
    <!-- L'Orizzonte (Arco Dinamico) -->
    <path d="M10 50 Q 40 5 70 50" fill="none" stroke="url(#grad)" stroke-width="7" stroke-linecap="round" filter="url(#glow)" />
    
    <!-- Il Punto di Luce (Core Intelligence) -->
    <circle cx="40" cy="35" r="5" fill="url(#grad)" filter="url(#glow)" />
    
    <!-- Riflesso inferiore -->
    <path d="M15 55 Q 40 85 65 55" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.4" />
  </g>

  <!-- Testo Brand: HORIZON -->
  <g transform="translate(115, 60)">
    <text font-family="Segoe UI, Inter, sans-serif" font-size="46" font-weight="100" letter-spacing="12" fill="url(#textGrad)">H<tspan font-weight="800" fill="url(#grad)">O</tspan>RIZON</text>
    <text y="18" x="2" font-family="Segoe UI, sans-serif" font-size="10" font-weight="700" letter-spacing="3.5" fill="#94a3b8" style="text-transform: uppercase;">Next-Gen Operations Hub</text>
  </g>
</svg>